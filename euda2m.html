<div style="text-align: center;">
  <img id="live-image" src="" style="width: 100%; max-width: 800px; height: auto; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: #222;">
  
  <p id="update-status" style="color: #666; font-family: sans-serif; font-size: 12px; margin-top: 8px; font-weight: bold;">  最後同步時間: 載入中...
  </p>
</div>

<script>
  var webAppUrl = "https://script.google.com/macros/s/AKfycbxHVefdwt1XABlPMrLags4BOAJop1UNZaVARvR5DnsSzbN9NiYmsusAufet3jEbwpPs/exec"; 
  
  var imgElement = document.getElementById('live-image');
  var statusElement = document.getElementById('update-status');

  function updateImage() {
    fetch(webAppUrl + "?t=" + new Date().getTime())
      .then(response => response.text())
      .then(base64 => {
        if (!base64.startsWith("Error")) {
          imgElement.src = "data:image/jpeg;base64," + base64;
          
          var now = new Date();
          var hours = now.getHours();
          var minutes = now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes();
          var seconds = now.getSeconds() < 10 ? '0' + now.getSeconds() : now.getSeconds();
          statusElement.innerText = "最後同步時間: " + hours + ":" + minutes + ":" + seconds;
          statusElement.style.color = "#2ecc71"; 
        } else {
          statusElement.innerText = "API recall error, please check the permission";
          statusElement.style.color = "#e74c3c";
        }
      })
      .catch(error => {
        console.log("Catch Fale:", error);
        statusElement.innerText = "Syns Error, please check the internet connection";
        statusElement.style.color = "#e74c3c";
      });
  }

  updateImage();

  setInterval(updateImage, 10000);
</script>
