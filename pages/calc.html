<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空天氣研究室 | 交易策略計算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
    <style>
        body { background-color: #060a0d; color: white; font-family: sans-serif; }
        .result-glow { text-shadow: 0 0 15px rgba(20, 184, 166, 0.7); }
        .leverage-glow { text-shadow: 0 0 10px rgba(45, 212, 191, 0.4); }
    </style>
</head>
<body class="pt-24 px-6">
    <div id="navbar-placeholder"></div>

    <div class="max-w-5xl mx-auto">
        <div class="relative rounded-2xl overflow-hidden mb-10 h-64 flex items-end p-8 bg-emerald-900/10 border border-emerald-800/40">
            <img src="https://images.unsplash.com/photo-1639762681057-408e52192e55?q=80&w=1200&auto=format&fit=crop" 
                 class="absolute inset-0 w-full h-full object-cover opacity-20">
            <div class="relative z-10">
                <span class="bg-emerald-900/60 border border-emerald-700/50 text-emerald-300 text-xs px-3 py-1 rounded-full mb-3 inline-block font-mono">Trading Tools</span>
                <h1 class="text-4xl font-black">止盈策略計算機</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            
            <div class="md:col-span-2 bg-[#0a1212] border border-teal-900/30 rounded-xl p-8 shadow-xl">
                <h2 class="text-emerald-400 font-bold text-lg mb-6 flex items-center gap-2">
                    <i class="ri-settings-4-line"></i> 策略參數設定
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-mono text-teal-500 uppercase tracking-widest mb-2">預計盈利 (%)</label>
                        <input type="number" id="targetProfit" value="5" 
                            class="w-full p-4 rounded-lg bg-[#060a0d]/80 border border-teal-900/50 text-teal-300 font-mono text-xl focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-mono text-gray-400 uppercase tracking-widest mb-2">槓桿倍數 (x)</label>
                            <input type="number" id="leverage" value="10" 
                                class="w-full p-4 rounded-lg bg-[#060a0d]/80 border border-teal-900/50 text-gray-300 font-mono focus:outline-none focus:border-teal-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-gray-400 uppercase tracking-widest mb-2">單邊手續費 (%)</label>
                            <input type="number" id="fee" value="0.05" step="0.01" 
                                class="w-full p-4 rounded-lg bg-[#060a0d]/80 border border-teal-900/50 text-gray-300 font-mono focus:outline-none focus:border-teal-500 transition">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-[#0a1212] border border-teal-900/40 rounded-xl p-8 flex flex-col justify-center shadow-[0_0_20px_rgba(20,184,166,0.1)]">
                
                <div class="text-center pb-6 border-b border-teal-900/30">
                    <h3 class="text-emerald-400 font-bold text-xs uppercase tracking-tighter mb-3">建議止盈實盤漲跌幅</h3>
                    <div id="result" class="text-4xl font-extrabold text-teal-400 font-mono result-glow">
                        -- %
                    </div>
                </div>

                <div class="text-center pt-6">
                    <h3 class="text-gray-500 font-bold text-xs uppercase tracking-tighter mb-3">預計總收益 (含槓桿)</h3>
                    <div id="totalReturn" class="text-2xl font-bold text-emerald-200 font-mono leverage-glow">
                        -- %
                    </div>
                    <p class="text-[9px] text-teal-900/60 mt-4 font-mono uppercase">Calculated with Leverage</p>
                </div>

            </div>

        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    
    <script>
        const targetProfitInput = document.getElementById('targetProfit');
        const leverageInput = document.getElementById('leverage');
        const feeInput = document.getElementById('fee');
        const resultDisplay = document.getElementById('result');
        const totalReturnDisplay = document.getElementById('totalReturn');

        function calculate() {
            const target = parseFloat(targetProfitInput.value) || 0;
            const lev = parseFloat(leverageInput.value) || 0;
            const fee = parseFloat(feeInput.value) || 0;

            if (lev > 0) {
                // 1. 計算實盤漲跌幅
                const realPercent = (target / lev) + (2 * fee);
                resultDisplay.innerText = realPercent.toFixed(4) + ' %';

                // 2. 計算總收益 (實盤 % * 槓桿)
                const totalReturn = realPercent * lev;
                totalReturnDisplay.innerText = totalReturn.toFixed(2) + ' %';
            } else {
                resultDisplay.innerText = 'NaN';
                totalReturnDisplay.innerText = 'NaN';
            }
        }

        [targetProfitInput, leverageInput, feeInput].forEach(input => {
            input.addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
