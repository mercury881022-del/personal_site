<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自訂 QR Code 產生器</title>

  <!-- QR Code Styling library -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

  <style>
    :root {
      --accent: #5b67f1;
      --accent-dark: #4650c9;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #202334;
      --muted: #6c7185;
      --border: #e4e6ef;
      --page-bg-1: #eef1ff;
      --page-bg-2: #f8f9ff;
      --danger: #d74646;
      --success: #26865f;
      --shadow: 0 18px 55px rgba(44, 52, 112, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei",
        system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(119, 130, 255, 0.21), transparent 28rem),
        radial-gradient(circle at 90% 90%, rgba(110, 216, 190, 0.16), transparent 25rem),
        linear-gradient(145deg, var(--page-bg-1), var(--page-bg-2));
      padding: 32px 18px;
    }

    .page {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .controls {
      padding: 28px;
    }

    .preview-panel {
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 590px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91, 103, 241, 0.12);
    }

    .hint {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .message {
      min-height: 19px;
      margin-top: 7px;
      font-size: 12px;
      color: var(--danger);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .color-control {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    input[type="color"] {
      width: 35px;
      height: 35px;
      border: 0;
      border-radius: 10px;
      background: none;
      padding: 0;
      cursor: pointer;
    }

    .color-value {
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 70px;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .range-value {
      text-align: center;
      padding: 8px 6px;
      border-radius: 10px;
      background: #f3f4fa;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      padding: 0 15px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s, box-shadow 0.16s, background 0.16s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 24px rgba(91, 103, 241, 0.28);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: #eef0f8;
      color: var(--text);
    }

    .download-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 330px;
      margin-top: 22px;
    }

    .download-row button {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .qr-stage {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 20px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(246, 247, 255, 0.96));
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 #fff;
      overflow: auto;
    }

    #qr-code {
      display: grid;
      place-items: center;
      max-width: 100%;
    }

    #qr-code canvas,
    #qr-code svg {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .preview-label {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 13px;
      color: var(--success);
      text-align: center;
    }

    .footer-note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 18px 12px;
      }

      .controls,
      .preview-panel {
        padding: 20px;
      }

      .grid-2,
      .button-row {
        grid-template-columns: 1fr;
      }

      .download-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <h1>自訂 QR Code 產生器</h1>
      <p>輸入網址，選擇顏色與外觀樣式，即可產生並下載 QR Code。</p>
    </header>

    <section class="app">
      <div class="panel controls">
        <h2 class="section-title">QR Code 設定</h2>

        <div class="form-group">
          <label for="urlInput">網址</label>
          <input
            id="urlInput"
            type="text"
            inputmode="url"
            autocomplete="url"
            value="https://example.com"
            placeholder="例如：https://example.com"
          />
          <div class="hint">未輸入 http:// 或 https:// 時，系統會自動補上 https://。</div>
          <div id="urlMessage" class="message"></div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="dotColor">QR Code 顏色</label>
            <div class="color-control">
              <input id="dotColor" type="color" value="#111827" />
              <span id="dotColorText" class="color-value">#111827</span>
            </div>
          </div>

          <div class="form-group">
            <label for="backgroundColor">背景顏色</label>
            <div class="color-control">
              <input id="backgroundColor" type="color" value="#ffffff" />
              <span id="backgroundColorText" class="color-value">#FFFFFF</span>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="dotStyle">主體風格</label>
            <select id="dotStyle">
              <option value="square">90 度方角</option>
              <option value="rounded">圓角方塊</option>
              <option value="dots">圓點</option>
              <option value="classy">經典造型</option>
              <option value="classy-rounded">經典圓角</option>
              <option value="extra-rounded">超圓角</option>
            </select>
          </div>

          <div class="form-group">
            <label for="cornerSquareStyle">定位框風格</label>
            <select id="cornerSquareStyle">
              <option value="square">90 度方角</option>
              <option value="extra-rounded">圓角</option>
              <option value="dot">圓形</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="cornerDotStyle">定位點風格</label>
            <select id="cornerDotStyle">
              <option value="square">方形</option>
              <option value="dot">圓形</option>
            </select>
          </div>

          <div class="form-group">
            <label for="errorCorrection">容錯等級</label>
            <select id="errorCorrection">
              <option value="L">低</option>
              <option value="M">中</option>
              <option value="Q">較高</option>
              <option value="H" selected>最高</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="sizeRange">輸出尺寸</label>
          <div class="range-row">
            <input id="sizeRange" type="range" min="200" max="1000" step="20" value="360" />
            <div id="sizeValue" class="range-value">360 px</div>
          </div>
        </div>

        <div class="form-group">
          <label for="marginRange">外圍留白</label>
          <div class="range-row">
            <input id="marginRange" type="range" min="0" max="40" step="2" value="12" />
            <div id="marginValue" class="range-value">12 px</div>
          </div>
        </div>

        <div class="button-row">
          <button id="generateBtn" type="button" class="primary">產生 QR Code</button>
          <button id="resetBtn" type="button" class="secondary">恢復預設值</button>
        </div>
      </div>

      <div class="panel preview-panel">
        <p class="preview-label">QR Code 預覽</p>

        <div class="qr-stage">
          <div id="qr-code"></div>
        </div>

        <div id="status" class="status"></div>

        <div class="download-row">
          <button id="downloadPngBtn" type="button">下載 PNG</button>
          <button id="downloadSvgBtn" type="button">下載 SVG</button>
        </div>

        <p class="footer-note">
          建議下載後先用手機實際掃描測試。背景與 QR Code 顏色請保留足夠對比，以避免無法辨識。
        </p>
      </div>
    </section>
  </main>

  <script>
    const elements = {
      urlInput: document.getElementById("urlInput"),
      dotColor: document.getElementById("dotColor"),
      backgroundColor: document.getElementById("backgroundColor"),
      dotColorText: document.getElementById("dotColorText"),
      backgroundColorText: document.getElementById("backgroundColorText"),
      dotStyle: document.getElementById("dotStyle"),
      cornerSquareStyle: document.getElementById("cornerSquareStyle"),
      cornerDotStyle: document.getElementById("cornerDotStyle"),
      errorCorrection: document.getElementById("errorCorrection"),
      sizeRange: document.getElementById("sizeRange"),
      marginRange: document.getElementById("marginRange"),
      sizeValue: document.getElementById("sizeValue"),
      marginValue: document.getElementById("marginValue"),
      urlMessage: document.getElementById("urlMessage"),
      status: document.getElementById("status"),
      generateBtn: document.getElementById("generateBtn"),
      resetBtn: document.getElementById("resetBtn"),
      downloadPngBtn: document.getElementById("downloadPngBtn"),
      downloadSvgBtn: document.getElementById("downloadSvgBtn")
    };

    const defaults = {
      url: "https://example.com",
      dotColor: "#111827",
      backgroundColor: "#ffffff",
      dotStyle: "square",
      cornerSquareStyle: "square",
      cornerDotStyle: "square",
      errorCorrection: "H",
      size: 360,
      margin: 12
    };

    const qrCode = new QRCodeStyling({
      width: defaults.size,
      height: defaults.size,
      type: "svg",
      data: defaults.url,
      margin: defaults.margin,
      qrOptions: {
        errorCorrectionLevel: defaults.errorCorrection
      },
      dotsOptions: {
        color: defaults.dotColor,
        type: defaults.dotStyle
      },
      backgroundOptions: {
        color: defaults.backgroundColor
      },
      cornersSquareOptions: {
        color: defaults.dotColor,
        type: defaults.cornerSquareStyle
      },
      cornersDotOptions: {
        color: defaults.dotColor,
        type: defaults.cornerDotStyle
      }
    });

    qrCode.append(document.getElementById("qr-code"));

    function normalizeUrl(value) {
      let url = value.trim();

      if (!url) {
        throw new Error("請先輸入網址。");
      }

      if (!/^https?:\/\//i.test(url)) {
        url = "https://" + url;
      }

      try {
        const parsed = new URL(url);
        if (!parsed.hostname || !parsed.hostname.includes(".")) {
          throw new Error();
        }
        return parsed.toString();
      } catch {
        throw new Error("網址格式不正確，請重新檢查。");
      }
    }

    function hexUpper(value) {
      return value.toUpperCase();
    }

    function getSettings() {
      return {
        url: normalizeUrl(elements.urlInput.value),
        dotColor: elements.dotColor.value,
        backgroundColor: elements.backgroundColor.value,
        dotStyle: elements.dotStyle.value,
        cornerSquareStyle: elements.cornerSquareStyle.value,
        cornerDotStyle: elements.cornerDotStyle.value,
        errorCorrection: elements.errorCorrection.value,
        size: Number(elements.sizeRange.value),
        margin: Number(elements.marginRange.value)
      };
    }

    function updateQr(showSuccess = false) {
      elements.urlMessage.textContent = "";
      elements.status.textContent = "";

      try {
        const settings = getSettings();

        qrCode.update({
          width: settings.size,
          height: settings.size,
          data: settings.url,
          margin: settings.margin,
          qrOptions: {
            errorCorrectionLevel: settings.errorCorrection
          },
          dotsOptions: {
            color: settings.dotColor,
            type: settings.dotStyle
          },
          backgroundOptions: {
            color: settings.backgroundColor
          },
          cornersSquareOptions: {
            color: settings.dotColor,
            type: settings.cornerSquareStyle
          },
          cornersDotOptions: {
            color: settings.dotColor,
            type: settings.cornerDotStyle
          }
        });

        if (showSuccess) {
          elements.status.textContent = "QR Code 已更新。";
        }

        return true;
      } catch (error) {
        elements.urlMessage.textContent = error.message;
        return false;
      }
    }

    function updateLabels() {
      elements.dotColorText.textContent = hexUpper(elements.dotColor.value);
      elements.backgroundColorText.textContent = hexUpper(elements.backgroundColor.value);
      elements.sizeValue.textContent = `${elements.sizeRange.value} px`;
      elements.marginValue.textContent = `${elements.marginRange.value} px`;
    }

    function resetForm() {
      elements.urlInput.value = defaults.url;
      elements.dotColor.value = defaults.dotColor;
      elements.backgroundColor.value = defaults.backgroundColor;
      elements.dotStyle.value = defaults.dotStyle;
      elements.cornerSquareStyle.value = defaults.cornerSquareStyle;
      elements.cornerDotStyle.value = defaults.cornerDotStyle;
      elements.errorCorrection.value = defaults.errorCorrection;
      elements.sizeRange.value = defaults.size;
      elements.marginRange.value = defaults.margin;
      elements.urlMessage.textContent = "";
      updateLabels();
      updateQr();
      elements.status.textContent = "已恢復預設值。";
    }

    elements.generateBtn.addEventListener("click", () => updateQr(true));
    elements.resetBtn.addEventListener("click", resetForm);

    elements.downloadPngBtn.addEventListener("click", () => {
      if (!updateQr()) return;
      qrCode.download({ name: "custom-qrcode", extension: "png" });
    });

    elements.downloadSvgBtn.addEventListener("click", () => {
      if (!updateQr()) return;
      qrCode.download({ name: "custom-qrcode", extension: "svg" });
    });

    [
      elements.dotColor,
      elements.backgroundColor,
      elements.dotStyle,
      elements.cornerSquareStyle,
      elements.cornerDotStyle,
      elements.errorCorrection,
      elements.sizeRange,
      elements.marginRange
    ].forEach((element) => {
      element.addEventListener("input", () => {
        updateLabels();
        updateQr();
      });
      element.addEventListener("change", () => {
        updateLabels();
        updateQr();
      });
    });

    elements.urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        updateQr(true);
      }
    });

    updateLabels();
  </script>
</body>
</html>
