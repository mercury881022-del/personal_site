<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空天氣研究室 | 衛星掩星觀測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
    <style>body { background-color: #060a0d; color: white; font-family: sans-serif; }</style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 left-0 w-full z-50 bg-[#060a0d]/90 backdrop-blur-md border-b border-teal-900/40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="https://public.readdy.ai/ai/img_res/f4897f5b-3554-4f1f-8862-12da2085430e.png" class="w-8 h-8">
                <span class="font-bold tracking-tight text-sm md:text-base">Space Weather Lab</span>
            </a>
            <div class="hidden md:flex gap-6 text-sm text-gray-300">
                <a href="index.html" class="hover:text-teal-400 transition">首頁</a>
                <a href="imaging.html" class="hover:text-teal-400 transition">全天影像</a>
                <a href="satellite.html" class="text-teal-400">衛星掩星</a>
                <a href="gps.html" class="hover:text-teal-400 transition">現地GPS</a>
                <a href="rocket.html" class="hover:text-teal-400 transition">火箭資訊</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto">
        <div class="relative rounded-2xl overflow-hidden mb-10 h-64 flex items-end p-8 bg-emerald-900/10 border border-emerald-800/40">
            <img src="https://readdy.ai/api/search-image?query=GPS%20satellite%20radio%20occultation%20ionosphere%20electron%20density%20orbit%20earth&width=1200&height=400" class="absolute inset-0 w-full h-full object-cover opacity-30">
            <div class="relative z-10">
                <span class="bg-emerald-900/60 border border-emerald-700/50 text-emerald-300 text-xs px-3 py-1 rounded-full mb-3 inline-block">Satellite Occultation</span>
                <h1 class="text-4xl font-black">衛星掩星觀測</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-[#0a1212] border border-teal-900/30 rounded-xl p-6">
                <h2 class="text-emerald-400 font-bold text-lg mb-3">觀測原理</h2>
                <p class="text-gray-400 text-sm leading-relaxed">
                    無線電掩星技術（Radio Occultation）利用 GPS 訊號穿透大氣層時產生的折射路徑，反演電離層電子密度剖面。
                    這能提供垂直解析度極高的數據，對於分析電離層波動結構與電漿不均勻體至關重要。
                </p>
            </div>
            <div class="bg-[#0a1212] border border-teal-900/30 rounded-xl p-6">
                <h2 class="text-emerald-400 font-bold text-lg mb-3">關鍵衛星任務</h2>
                <ul class="space-y-2 text-xs text-gray-300">
                    <li class="flex justify-between border-b border-teal-900/20 py-2"><span>FORMOSAT-7 / COSMIC-2</span><span class="text-gray-500">24° 傾角</span></li>
                    <li class="flex justify-between border-b border-teal-900/20 py-2"><span>FORMOSAT-3 / COSMIC-1</span><span class="text-gray-500">已退役</span></li>
                    <li class="flex justify-between py-2"><span>Spire Global 星座</span><span class="text-gray-500">商業觀測</span></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
